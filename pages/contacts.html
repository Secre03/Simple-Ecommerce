<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../css/custom.css">

    <link rel="stylesheet" href="../css/pages/contacts.css">
</head>
<body>
    <div class="page-transition"></div>

    <header class="fixed-top bg-light">
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid px-5">
                <a class="navbar-brand" href="../index.html">
                    <img class="logo-img" src="../assets/logo/logo.png" alt="logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav gap-lg-5">
                        <li class="nav-item"><a class="nav-link fw-bold" href="../index.html">HOME</a></li>
                        <li class="nav-item"><a class="nav-link fw-bold" href="../pages/about.html">ABOUT</a></li>
                        <li class="nav-item"><a class="nav-link fw-bold" href="../pages/products.html">PRODUCTS</a></li>
                        <li class="nav-item"><a class="nav-link fw-bold" href="../pages/contacts.html">CONTACT</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <section class="contact-banner text-center text-white position-fixed w-100">
        <h1 class="contact-heading mb-0">Contact us</h1>
    </section>

    <section class="contact-form-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <form class="contact-form">
                        <div class="mb-4">
                            <input type="text" class="form-control contact-input" placeholder="Enter Your Full Name">
                        </div>
                        <div class="mb-4">
                            <input type="email" class="form-control contact-input" placeholder="Enter Your Email Address">
                        </div>
                        <div class="mb-4">
                            <textarea class="form-control contact-textarea" rows="6" placeholder="Enter Your Message"></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn-submit-contact">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer-section text-white py-5">
        <div class="container">
            <div class="row justify-content-center g-5">
                <div class="col-lg-4">
                    <h1 class="footer-title mb-4">Reach at..</h1>
                    <ul class="list-unstyled footer-list">
                        <li><a href="#"><i class="fa-solid fa-location-dot me-2"></i>Busay,Daraga,Albay</a></li>
                        <li><a href="#"><i class="fa-solid fa-phone me-2"></i>+63 9636 397 456</a></li>
                        <li><a href="#"><i class="fa-solid fa-at me-2"></i>markmilano112@gmail.com</a></li>
                    </ul>
                </div>
                <div class="col-lg-4 text-center">
                    <h1 class="footer-title mb-4">Socials</h1>
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-twitter"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="text-center mt-5 pt-4 border-top border-secondary">
                <p class="mb-2">©2025 All Rights Reserved</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
