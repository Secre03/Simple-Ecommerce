<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracking</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="../../css/custom.css" />
    <link rel="stylesheet" href="../../css/pages/products.css" />

    <link rel="stylesheet" href="../../css/pages/tracking.css" />
  </head>
  <body>
    <div class="page-transition"></div>

    <header class="fixed-top bg-light">
      <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid px-5">
          <a class="navbar-brand" href="../../index.html">
            <img class="logo-img" src="../../assets/logo/logo.png" alt="logo" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav gap-lg-5">
              <li class="nav-item">
                <a class="nav-link fw-bold" href="../../index.html">HOME</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold" href="../about.html">ABOUT</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold" href="../products.html">PRODUCTS</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold" href="../contacts.html">CONTACT</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <section class="search-bar-section fixed-top">
      <div class="container-fluid">
        <div class="row align-items-center g-3">
          <div class="col-lg-3 col-md-12">
            <div class="products-title">
              <p class="mb-0">
                Our<span class="products-accent">Products</span>
              </p>
            </div>
          </div>

          <div class="col-lg-6 col-md-8">
            <div class="search-wrapper d-flex">
              <input
                class="form-control search-input-field"
                type="text"
                placeholder="Search"
              />
              <button class="search-btn">
                <img src="../../assets/logo/search-icon.png" alt="search" />
              </button>
            </div>
          </div>

          <div class="col-lg-3 col-md-4">
            <div
              class="cart-section d-flex justify-content-end align-items-center gap-3"
            >
              <a href="./orders.html" class="text-decoration-none text-white">
                <p class="mb-0">
                  Returns<br /><span class="fw-bold">& Orders</span>
                </p>
              </a>
              <div class="cart-info d-flex align-items-center gap-2">
                <a href="./checkout.html">
                  <img
                    class="cart-icon"
                    src="../../assets/logo/cart-icon.png"
                    alt="cart"
                  />
                </a>
                <p class="mb-0 text-white fw-bold">Cart</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main class="tracking-main-section">
      <div class="container">
        <div class="tracking-content">
          <a class="back-link" href="./orders.html"> View all orders </a>

          <div class="delivery-date-heading">Arriving on Monday, June 13</div>

          <div class="product-detail-info">Men's Shirts</div>

          <div class="product-detail-info">Quantity: 1</div>

          <img
            class="product-tracking-image"
            src="../../assets/img/products/mens1.webp"
            alt="Men's Shirts"
          />

          <div class="progress-status-container">
            <div class="status-label">Preparing</div>
            <div class="status-label status-current">Shipped</div>
            <div class="status-label">Delivered</div>
          </div>

          <div class="progress-bar-wrapper">
            <div class="progress-bar-fill"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/styles.js"></script>

    <script src="../../js/utils.js"></script>
    <script src="../../js/delivery.js"></script>
    <script src="../../js/products.js"></script>
    <script src="../../js/cart.js"></script>
    <script src="../../js/orders.js"></script>
    <script src="../../js/tracking.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../../js/contentPadding.js"></script>
  </body>
</html>
